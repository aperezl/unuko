services:
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - unuko-net

  open5gs-hss:
    image: openverso/open5gs-webui:2.7.0
    container_name: open5gs-hss
    depends_on:
      - mongo
    command: open5gs-hssd
    ports:
      - "9998:9999" # Lo mapeamos al 9998 para no chocar con el SMF
    volumes:
      - ./config/hss.yaml:/opt/open5gs/etc/open5gs/hss.yaml
    networks:
      - unuko-net

  open5gs-smf:
    image: openverso/open5gs-webui:2.7.0
    container_name: open5gs-smf
    depends_on:
      - mongo
    command: open5gs-smfd
    ports:
      - "9999:9999" # Mapeamos el puerto para que el curl funcione
    networks:
      - unuko-net

  ueransim:
    image: free5gc/ueransim:latest
    container_name: ueransim
    privileged: true
    tty: true
    # Le indicamos la ruta exacta que acabas de encontrar
    # Añadimos el tail para que, si el gNB falla por falta de config, el contenedor siga vivo
    command: sh -c "/ueransim/nr-gnb --help && tail -f /dev/null"
    networks:
      - unuko-net
    ports:
      - "37412:37412"

  smdp-mock:
    build:
      context: .
      dockerfile: apps/smdp-mock/Dockerfile
    container_name: smdp-mock
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    networks:
      - unuko-net

networks:
  unuko-net:
    driver: bridge

volumes:
  mongodb_data:
